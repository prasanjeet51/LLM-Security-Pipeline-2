data:
  sources:
    - jailbreakbench
    - advbench
    - advbench_csv
    - jackhhao
    - deepset_prompt_injections
    - spml_injections
    - safe_corpus
    - safe_questions
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  seed: 42
  max_samples_per_source: null

model:
  stage_a:
    model_name: "answerdotai/ModernBERT-base"
    max_length: 512
    num_labels: 3
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.1
    target_modules: ["Wqkv", "Wo"]
    attn_implementation: "sdpa"
  stage_b:
    model_name: "meta-llama/Llama-Guard-3-8B"
    enabled: false  # 16 GB model — requires HF gated access + GPU; disabled for local dev
    use_api: false  # set true to use Together AI instead of local model (HF Space mode)
  perplexity_threshold: 500.0
  similarity:
    model_name: "all-MiniLM-L6-v2"
    threshold: 0.85
    index_path: "data/faiss_index/attack_index.faiss"
  normalization:
    strip_zero_width: true
    normalize_homoglyphs: true
    normalize_leetspeak: true
  explainability:
    method: "integrated_gradients"
    n_steps: 50
    enabled: true

feedback:
  db_path: "data/feedback.db"
  min_corrections_for_retrain: 50

onnx:
  export_path: "models/stage_a_onnx/"
  model_file: "model_int8.onnx"
  optimize: true

training:
  batch_size: 4
  epochs: 5
  learning_rate: 1.0e-4
  warmup_ratio: 0.1
  weight_decay: 0.01
  seed: 42
  early_stopping_patience: 3

baseline:
  tfidf_max_features: 50000
  svc_C: 1.0

evaluation:
  thresholds:
    block_confidence: 0.85
    allow_confidence: 0.90
    uncertain_band: [0.5, 0.85]

redteam:
  seed: 42
  n_mutations_per_template: 5
  output_dir: "reports/redteam"

api:
  rate_limit_classify: "120/minute"
  max_payload_mb: 1
  cors_origins: ["http://localhost:3000"]
  host: "0.0.0.0"
  port: 8000

weave:
  enabled: false

mlflow:
  experiment_name: "p1-hybrid-jailbreak"

docker:
  image_name: "p1-hybrid-jailbreak-detector"
